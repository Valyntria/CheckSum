name: Update Cargo.lock

on:
  workflow_dispatch:

jobs:
  update-lockfile:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup2.4-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.0-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Regenerate Cargo.lock
        run: cargo update --manifest-path src-tauri/Cargo.toml

      - name: Commit updated Cargo.lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/Cargo.lock
          git diff --staged --quiet || git commit -m "chore: regenerate Cargo.lock after removing reqwest"
          git push
